meta:
  language-name: Español
buttons:
  previous: <gray>Anterior</gray>
  next: <green>Siguiente</green>
  close: <yellow>Cerrar</yellow>
  disable: <red>No volver a mostrar</red>
messages:
  disabled: <green>La guía del servidor ya no se abrirá automáticamente.</green>
  reset-self: <green>Tu preferencia de la guía se ha restablecido.</green>
  reset-other: <green>La preferencia de guía de <player> se ha restablecido.</green>
  reloaded: <green>La configuración y los idiomas de ServerGuide se han recargado.</green>
  no-permission: <red>No tienes permiso.</red>
  player-not-found: <red>Jugador no encontrado.</red>
  player-only: <red>Este comando solo puede usarlo un jugador.</red>
pages:
  welcome:
    title: <gold><bold>Welcome to <server_name></bold></gold>
    lines:
    - <white>Welcome to <aqua><server_name></aqua>!</white>
    - ''
    - <gray>This guide explains the most important features of the server.</gray>
    - ''
    - <yellow>Website:</yellow> <click:open_url:'<website>'><hover:show_text:'<green>Open website</green>'><aqua><underlined><website_display></underlined></aqua></hover></click>
    - <yellow>Discord:</yellow> <click:open_url:'<discord>'><hover:show_text:'<green>Open Discord</green>'><aqua><underlined><discord_display></underlined></aqua></hover></click>
    - ''
    - <gray>Use <white>/serverguide</white> to open this guide again at any time.</gray>
  claiming:
    title: <green><bold>Claiming Land</bold></green>
    lines:
    - <white>Replace this text with instructions for your claim plugin.</white>
    - ''
    - <yellow>Example:</yellow>
    - <gray>Select two opposite corners of your area.</gray>
    - <gray>Add the required commands and tools here.</gray>
  protection:
    title: <gold><bold>Protecting Doors and Chests</bold></gold>
    lines:
    - <white>Replace this text with instructions for your protection plugin.</white>
    - ''
    - <yellow>Example:</yellow> <aqua>/lock</aqua>
    - <gray>Add more steps and supported blocks here.</gray>
  homes:
    title: <aqua><bold>Setting Your Home</bold></aqua>
    lines:
    - <aqua>/sethome</aqua>
    - <gray>Saves your current location as home.</gray>
    - ''
    - <aqua>/home</aqua>
    - <gray>Teleports you to your saved home.</gray>
  commands:
    title: <light_purple><bold>Important Commands</bold></light_purple>
    lines:
    - <white>Add the most important commands for your server here.</white>
    - ''
    - <aqua>/spawn</aqua> <gray>- Teleports you to spawn.</gray>
    - <aqua>/serverguide</aqua> <gray>- Opens this guide again.</gray>
