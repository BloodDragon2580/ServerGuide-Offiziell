  next: <green>下一页</green>
  close: <yellow>关闭</yellow>
  disable: <red>不再显示</red>
messages:
  disabled: <green>服务器指南将不再自动打开。</green>
  reset-self: <green>你的指南设置已重置。</green>
  reset-other: <green>玩家 <player> 的指南设置已重置。</green>
